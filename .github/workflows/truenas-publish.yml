name: TrueNAS Catalog Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      bump:
        description: "Catalog-Versions-Bump"
        type: choice
        options: [patch, minor, major]
        default: patch

permissions:
  contents: write

concurrency:
  group: truenas-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Oikos
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate TrueNAS files & bump catalog version
        id: gen
        env:
          BUMP_INPUT: ${{ github.event.inputs.bump }}
        run: |
          BUMP="${BUMP_INPUT:-patch}"
          mkdir -p /tmp/truenas-out
          node tools/truenas/generate.mjs --bump="$BUMP" \
            --out "/tmp/truenas-out/ix-dev/community/oikos"
          echo "catalog=$(node -p "require('./deploy/truenas/catalog-version.json').version")" >> "$GITHUB_OUTPUT"

      - name: Commit catalog-version.json back to Oikos
        env:
          CATALOG: ${{ steps.gen.outputs.catalog }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- deploy/truenas/catalog-version.json; then
            git add deploy/truenas/catalog-version.json
            git commit -m "chore(truenas): bump catalog version to $CATALOG [skip ci]"
            git push origin HEAD:main
          fi
